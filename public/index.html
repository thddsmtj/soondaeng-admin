<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>순댕이 관리자</title>
  <link rel="stylesheet" href="/admin.css">
</head>
<body>
  <svg aria-hidden="true" width="0" height="0" class="defs">
    <symbol id="chart" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="m7 15 4-4 3 3 5-7"/></symbol>
    <symbol id="refresh" viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-15.5 6.2"/><path d="M3 12A9 9 0 0 1 18.5 5.8"/><path d="M18 2v4h-4"/><path d="M6 22v-4h4"/></symbol>
    <symbol id="download" viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></symbol>
    <symbol id="mail" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="m4 7 8 6 8-6"/></symbol>
    <symbol id="check" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></symbol>
    <symbol id="close" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></symbol>
  </svg>

  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark"><svg><use href="#chart"></use></svg></div>
        <div>
          <h1>순댕이 관리자</h1>
          <p>회원 승인과 7일 순위 리포트를 관리합니다.</p>
        </div>
      </div>
      <form id="secretForm" class="secret-form">
        <input id="secretInput" type="password" autocomplete="current-password" placeholder="ADMIN_SECRET">
        <button class="primary" type="submit">연결</button>
      </form>
    </header>

    <section class="toolbar">
      <button id="refreshButton" class="ghost" type="button"><svg><use href="#refresh"></use></svg><span>새로고침</span></button>
      <button id="trackAllButton" class="ghost" type="button"><svg><use href="#refresh"></use></svg><span>전체조회</span></button>
      <button id="downloadReportButton" class="ghost" type="button"><svg><use href="#download"></use></svg><span>엑셀</span></button>
      <button id="sendReportButton" class="primary" type="button"><svg><use href="#mail"></use></svg><span>메일 발송</span></button>
      <button id="logoutButton" class="ghost" type="button">로그아웃</button>
    </section>

    <section class="kpis">
      <article data-scroll-target="usersPanel" role="button" tabindex="0"><span>회원</span><strong id="kpiUsers">0</strong></article>
      <article data-scroll-target="usersPanel" role="button" tabindex="0"><span>승인대기</span><strong id="kpiPending">0</strong></article>
      <article data-scroll-target="productsPanel" role="button" tabindex="0"><span>키워드</span><strong id="kpiProducts">0</strong></article>
      <article data-scroll-target="productsPanel" role="button" tabindex="0"><span>수집상품</span><strong id="kpiKeywords">0</strong></article>
      <article data-scroll-target="apiPanel" role="button" tabindex="0"><span>오늘 API</span><strong id="kpiApiToday">0</strong></article>
      <article data-scroll-target="apiPanel" role="button" tabindex="0"><span>최근조회</span><strong id="kpiChecked">-</strong></article>
    </section>

    <section class="panel" id="apiPanel">
      <div class="panel-head">
        <div>
          <h2>API 호출 현황</h2>
          <p>네이버 쇼핑 검색 API 사용량입니다.</p>
        </div>
      </div>
      <div id="apiUsagePanel" class="api-usage-panel"></div>
    </section>

    <section class="panel" id="usersPanel">
      <div class="panel-head">
        <div>
          <h2>회원 승인</h2>
          <p>새 가입자는 승인 전까지 로그인할 수 없습니다.</p>
        </div>
      </div>
      <div id="userList" class="user-list"></div>
    </section>

    <section class="panel" id="productsPanel">
      <div class="panel-head">
        <div>
          <h2>전체 키워드</h2>
          <p>키워드별 최신 1~50위 수집 결과입니다.</p>
        </div>
      </div>
      <div id="productList" class="product-list"></div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>
  <script src="/admin.js"></script>
</body>
</html>
